<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catedral del Milagro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="wrapper">
      <header>
        <h1>Catedral del Milagro</h1>
      </header>

      <nav>
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="tabla.html">Tabla de Usuarios</a></li>
          <li><a href="form.html">Crear Usuario</a></li>
        </ul>
      </nav>

      <div id="main-container">
        <section id="content">
          <h2>Tabla de Usuarios</h2>
          <table id="main-table">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Cedula</th>
                <th>Edad</th>
              </tr>
            </thead>
          </table>
        </section>

        <aside id="sidebar">
          <h3>Filtro por Cédula</h3>
          <input
            type="text"
            id="buscarCedula"
            placeholder="Buscar por cédula"
          />
          <button onclick="consultarPorCedula()" class="consultarButton">Consultar</button>
      </div>

      <footer>
        <div class="w3c-icons">
          <img
            src="http://www.w3.org/Icons/valid-html401"
            alt="Valid HTML 4.01"
          />
          <img
            src="http://jigsaw.w3.org/css-validator/images/vcss"
            alt="Valid CSS!"
          />
        </div>
        <div class="copyright">
          &copy; 2026 Universidad de Carabobo - Facultad Experimental de
          Ciencias y Tecnología.
        </div>
      </footer>
    </div>
    <script src="tablaHandler.js"></script>
  </body>
</html>
